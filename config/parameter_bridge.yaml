# controller_joint_names: ['', 'left sus attachment', 'benaam 1', 'benaam 2', 'right sus attachment', 'benaam 3', 'benaam 4', 'joint', ]
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "ignition.msgs.Clock"
  direction: GZ_TO_ROS

